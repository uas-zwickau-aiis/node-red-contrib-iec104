<script type="text/javascript">
RED.nodes.registerType('iec104-observer',{
  category: 'IEC 104',
  color: '#dce5f5',
  defaults: {
    name: { value: "" },
    connection: { type: "iec104-gateway", required: true }
  },
  inputs: 0,
  outputs: 2,
  outputLabels: [
    "Data",
    "Status"
  ],
  icon: "font-awesome/fa-eye",
  paletteLabel: "IEC104 Observer",
  label: function() {
    return this.name || "IEC104 Observer";
  }
});
</script>

<script type="text/html" data-template-name="iec104-observer">

  <div class="form-row">
    <label for="node-input-name">Name</label>

  </div>

  <div class="form-row">
    <label for="node-input-connection">Gateway</label>
    <input type="text" id="node-input-connection">
  </div>

  <hr>

  <div class="form-row">
    <label>Info</label>
    <span style="margin-left:10px; color:#888;">
      Listens to IEC104 events (data/status)
    </span>
  </div>

</script>
