<script type="text/javascript">
  RED.nodes.registerType('iec104_measuredvalue', {
    category: 'IEC 104',
    color: '#dce5f5',
    defaults: {
      name: { value: "" },
      ioa: { value: 1000, validate: RED.validators.number() },

      meType: { value: "M_ME_NC_1" },
      tsSource: { value: "now" },

      // Quality Defaults (IEC 60870-5-104 / IEC 60870-5-101 QDS bits)
      // BL  = Blocked
      // SB  = Substituted
      // INT = Not topical (old value / not up-to-date)
      // IV  = Invalid
      // OV  = Overflow
      qBL: { value: false },
      qSB: { value: false },
      qINT: { value: false },
      qIV: { value: false },
      qOV: { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || "iec104_measuredvalue";
    },

    oneditprepare: function () {
      function isCp56Type(t) {
        return t === "M_ME_TD_1" || t === "M_ME_TE_1";
      }

      function updateVisibility() {
        const t = $("#node-input-meType").val();
        if (isCp56Type(t)) $(".row-ts").show();
        else $(".row-ts").hide();
      }

      $("#node-input-meType").on("change", updateVisibility);
      updateVisibility();
    }
  });
</script>

<script type="text/html" data-template-name="iec104_measuredvalue">

  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name">
  </div>

  <div class="form-row">
    <label for="node-input-ioa">IOA (Objektadresse)</label>
    <input type="number" id="node-input-ioa">
  </div>

  <div class="form-row">
    <label for="node-input-meType">Meldetyp</label>
    <select id="node-input-meType">
      <option value="M_ME_NB_1">M_ME_NB_1 (scaled, ohne Zeit)</option>
      <option value="M_ME_NC_1">M_ME_NC_1 (float, ohne Zeit)</option>
      <option value="M_ME_TD_1">M_ME_TD_1 (scaled, CP56Time2a)</option>
      <option value="M_ME_TE_1">M_ME_TE_1 (float, CP56Time2a)</option>
    </select>
  </div>

  <div class="form-row row-ts">
    <label for="node-input-tsSource">Zeitquelle (CP56)</label>
    <select id="node-input-tsSource">
      <option value="now">jetzt</option>
      <option value="msg">msg.ts verwenden</option>
    </select>
  </div>

  <hr>

  <div class="form-row">
    <label>Quality Defaults (QDS)</label>
  </div>

  <div class="form-row">
    <label for="node-input-qBL">BL (Blocked / gesperrt)</label>
    <input type="checkbox" id="node-input-qBL">
  </div>

  <div class="form-row">
    <label for="node-input-qSB">SB (Substituted / ersetzt)</label>
    <input type="checkbox" id="node-input-qSB">
  </div>

  <div class="form-row">
    <label for="node-input-qINT">INT (Not topical / nicht aktuell)</label>
    <input type="checkbox" id="node-input-qINT">
  </div>

  <div class="form-row">
    <label for="node-input-qIV">IV (Invalid / ungültig)</label>
    <input type="checkbox" id="node-input-qIV">
  </div>

  <div class="form-row">
    <label for="node-input-qOV">OV (Overflow / Überlauf)</label>
    <input type="checkbox" id="node-input-qOV">
  </div>

</script>

<script type="text/html" data-help-name="iec104_measuredvalue">
  <p>
    Erzeugt aus <code>msg.payload</code> einen IEC-104 Messwert (z. B. <code>M_ME_NC_1</code>) und schreibt ihn als Objekt in <code>msg.payload</code>.
  </p>

  <h3>Eingang</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">number|string</span></dt>
    <dd>Messwert. Strings dürfen Komma oder Punkt enthalten.</dd>

    <dt class="optional">quality <span class="property-type">object</span></dt>
    <dd>
      Optionales Quality-Objekt überschreibt die Defaults.
      Unterstützte Felder (voll ausgeschrieben):
      <ul>
        <li><code>BL</code> = <b>Blocked</b> (gesperrt / blockiert)</li>
        <li><code>SB</code> = <b>Substituted</b> (ersetzt)</li>
        <li><code>INT</code> = <b>Not topical</b> (nicht aktuell / Wert ist veraltet)</li>
        <li><code>IV</code> = <b>Invalid</b> (ungültig)</li>
        <li><code>OV</code> = <b>Overflow</b> (Überlauf)</li>
      </ul>
    </dd>

    <dt class="optional">ts <span class="property-type">string|number</span></dt>
    <dd>Nur bei CP56-Typen: Timestamp (ISO oder epoch ms), wenn Zeitquelle auf <code>msg.ts</code> steht.</dd>
  </dl>

  <h3>Ausgang</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>
      IEC-104 Messwertobjekt:
      <pre>{
  "type": "M_ME_NC_1",
  "ioa": 1000,
  "value": 12.34,
  "quality": {
    "BL": false,   // Blocked
    "SB": false,   // Substituted
    "INT": false,  // Not topical
    "IV": false,   // Invalid
    "OV": false    // Overflow
  },
  "ts": "2026-03-04T12:34:56.789Z" // nur bei CP56-Typen (TD/TE/TF)
}</pre>
    </dd>
  </dl>
</script>
