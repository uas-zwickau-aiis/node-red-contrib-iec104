<script type="text/javascript">
  RED.nodes.registerType('iec104-singlepoint', {
    category: 'IEC 104',
    color: '#dce5f5',
    defaults: {
      name: { value: "" },

      ioa0: { value: 0, validate: function(v) { return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255; } },
      ioa1: { value: 0, validate: function(v) { return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255; } },
      ioa2: { value: 0, validate: function(v) { return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255; } },

      spType: { value: "M_SP_NA_1" },
      tsSource: { value: "now" },

      qInvalidMode: { value: "msg" },
      qSubstitutedMode: { value: "msg" },
      qBlockedMode: { value: "msg" },
      qNotTopicalMode: { value: "msg" }
    },
    inputs: 1,
    outputs: 1,
    icon: "serial.svg",
    paletteLabel: "Einzelmeldung",
    label: function () {
      return this.name || "Einzelmeldung";
    },
    oneditprepare: function () {
      function updateIoaPreview() {
        var b0 = parseInt($("#node-input-ioa0").val(), 10);
        var b1 = parseInt($("#node-input-ioa1").val(), 10);
        var b2 = parseInt($("#node-input-ioa2").val(), 10);

        b0 = isNaN(b0) ? 0 : b0;
        b1 = isNaN(b1) ? 0 : b1;
        b2 = isNaN(b2) ? 0 : b2;

        var ioa = (b0 << 16) + (b1 << 8) + b2;
        var hex = "0x" + ioa.toString(16).toUpperCase().padStart(6, "0");

        $("#node-ioa-preview").text("Dezimal (Hex): " + ioa + " (" + hex + ")");
      }

      $("#node-input-ioa0, #node-input-ioa1, #node-input-ioa2").on("input change", updateIoaPreview);

      updateIoaPreview();
    }
  });
</script>

<script type="text/html" data-template-name="iec104-singlepoint">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>

  <div class="form-row">
    <label>IOA</label>
    <input type="number" id="node-input-ioa0" min="0" max="255" placeholder="B0" style="width:60px; margin-right:5px;">
    <input type="number" id="node-input-ioa1" min="0" max="255" placeholder="B1" style="width:60px; margin-right:5px;">
    <input type="number" id="node-input-ioa2" min="0" max="255" placeholder="B2" style="width:60px;">
  </div>
  <div class="form-row">
    <label></label>
    <div id="node-ioa-preview" class="form-tips" style="width:auto;">
      Dezimal (Hex): 0 (0x000000)
    </div>
  </div>

  <div class="form-row">
    <label for="node-input-spType">Meldetyp</label>
    <select id="node-input-spType">
      <option value="M_SP_NA_1">M_SP_NA_1 (ohne Zeit)</option>
      <option value="M_SP_TA_1">M_SP_TA_1 (CP24Time2a)</option>
      <option value="M_SP_TB_1">M_SP_TB_1 (CP56Time2a)</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-tsSource">Zeitquelle (nur TA/TB)</label>
    <select id="node-input-tsSource">
      <option value="now">jetzt (ISO)</option>
      <option value="msg">msg.ts übernehmen</option>
    </select>
  </div>

  <hr>

  <div class="form-row">
    <label>Quality-Verhalten</label>
  </div>

  <div class="form-row">
    <label for="node-input-qInvalidMode">invalid</label>
    <select id="node-input-qInvalidMode">
      <option value="msg">aus msg.quality.invalid</option>
      <option value="false">false</option>
      <option value="true">true</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-qSubstitutedMode">substituted</label>
    <select id="node-input-qSubstitutedMode">
      <option value="msg">aus msg.quality.substituted</option>
      <option value="false">false</option>
      <option value="true">true</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-qBlockedMode">blocked</label>
    <select id="node-input-qBlockedMode">
      <option value="msg">aus msg.quality.blocked</option>
      <option value="false">false</option>
      <option value="true">true</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-qNotTopicalMode">notTopical</label>
    <select id="node-input-qNotTopicalMode">
      <option value="msg">aus msg.quality.notTopical</option>
      <option value="false">false</option>
      <option value="true">true</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="iec104-singlepoint">
  <p>
    Diese Node nimmt <code>msg.payload</code> (true/false) entgegen und erzeugt eine IEC104 Single-Point-Meldung als Objekt in <code>msg.payload</code>.
  </p>

  <ul>
    <li><b>M_SP_NA_1</b>: ohne Zeitstempel</li>
    <li><b>M_SP_TA_1</b>: mit Zeitstempel</li>
    <li><b>M_SP_TB_1</b>: mit Zeitstempel</li>
  </ul>

  <p>
    Die Objektadresse <code>ioa</code> wird als Array aus drei Bytes aufgebaut:
    <code>[ioa0, ioa1, ioa2]</code>.
  </p>

  <p>
    Die Quality-Merkmale <code>invalid</code>, <code>substituted</code>, <code>blocked</code> und
    <code>notTopical</code> können entweder aus <code>msg.quality</code> übernommen oder in der Node
    fest erzwungen werden.
  </p>

  <p>
    Optional kannst du bei TA/TB <code>msg.ts</code> mitgeben, wenn du "msg.ts übernehmen" auswählst.
  </p>
</script>
