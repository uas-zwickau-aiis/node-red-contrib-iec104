<script type="text/javascript">
  RED.nodes.registerType('iec104_doublepoint', {
    category: 'IEC 104',
    color: '#dce5f5',
    defaults: {
      name: { value: "" },
      ioa: { value: 1000, validate: RED.validators.number() },

      // NICHT "type" nennen
      dpType: { value: "M_DP_NA_1" },

      // nur relevant bei TA/TB
      tsSource: { value: "now" },

      // Quality Defaults
      qInvalid: { value: false },
      qSubstituted: { value: false },
      qBlocked: { value: false },
      qNotTopical: { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || "iec104_doublepoint";
    }
  });
</script>

<script type="text/html" data-template-name="iec104_doublepoint">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>

  <div class="form-row">
    <label for="node-input-ioa">IOA (Objektadresse)</label>
    <input type="number" id="node-input-ioa">
  </div>

  <div class="form-row">
    <label for="node-input-dpType">Meldetyp</label>
    <select id="node-input-dpType">
      <option value="M_DP_NA_1">M_DP_NA_1 (ohne Zeit)</option>
      <option value="M_DP_TA_1">M_DP_TA_1 (CP24Time2a)</option>
      <option value="M_DP_TB_1">M_DP_TB_1 (CP56Time2a)</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-tsSource">Zeitquelle (nur TA/TB)</label>
    <select id="node-input-tsSource">
      <option value="now">jetzt (ISO)</option>
      <option value="msg">msg.ts übernehmen</option>
    </select>
  </div>

  <hr>

  <div class="form-row">
    <label>Quality Defaults</label>
  </div>

  <div class="form-row">
    <label for="node-input-qInvalid">invalid</label>
    <input type="checkbox" id="node-input-qInvalid" style="width:auto;">
  </div>
  <div class="form-row">
    <label for="node-input-qSubstituted">substituted</label>
    <input type="checkbox" id="node-input-qSubstituted" style="width:auto;">
  </div>
  <div class="form-row">
    <label for="node-input-qBlocked">blocked</label>
    <input type="checkbox" id="node-input-qBlocked" style="width:auto;">
  </div>
  <div class="form-row">
    <label for="node-input-qNotTopical">notTopical</label>
    <input type="checkbox" id="node-input-qNotTopical" style="width:auto;">
  </div>
</script>

<script type="text/html" data-help-name="iec104_doublepoint">
  <p>
    Diese Node nimmt <code>msg.payload</code> als Double Point (DPI) entgegen und erzeugt eine IEC104 Doppelmeldung als Objekt in <code>msg.payload</code>.
  </p>
  <p><b>Input:</b> <code>msg.payload</code> muss Integer 0..3 sein:</p>
  <ul>
    <li>0 = Zwischenstellung (intermediate)</li>
    <li>1 = AUS (off)</li>
    <li>2 = EIN (on)</li>
    <li>3 = unbestimmt/ungültig (indeterminate)</li>
  </ul>
  <p>
    Bei <b>M_DP_TA_1</b> / <b>M_DP_TB_1</b> wird ein Zeitstempel in <code>ts</code> gesetzt (Simulation: ISO).
    Optional kann <code>msg.ts</code> übernommen werden, wenn "msg.ts übernehmen" gewählt ist.
  </p>
</script>
