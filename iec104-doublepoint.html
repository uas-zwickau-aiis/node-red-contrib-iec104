<script type="text/javascript">
  RED.nodes.registerType('iec104_doublepoint', {
    category: 'IEC 104',
    color: '#dce5f5',
    defaults: {
      name: { value: "" },

      ioa0: {
        value: 232,
        validate: function(v) {
          return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255;
        }
      },
      ioa1: {
        value: 3,
        validate: function(v) {
          return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255;
        }
      },
      ioa2: {
        value: 0,
        validate: function(v) {
          return RED.validators.number()(v) && Number(v) >= 0 && Number(v) <= 255;
        }
      },

      dpType: { value: "M_DP_NA_1" },
      tsSource: { value: "now" },

      qInvalidMode: { value: "msg" },
      qSubstitutedMode: { value: "msg" },
      qBlockedMode: { value: "msg" },
      qNotTopicalMode: { value: "msg" }
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || "iec104_doublepoint";
    }
  });
</script>

<script type="text/html" data-help-name="iec104_doublepoint">
  <p>
    Diese Node nimmt <code>msg.payload</code> als Double Point (DPI) entgegen und erzeugt eine IEC104-Doppelmeldung als Objekt in <code>msg.payload</code>.
  </p>

  <p><b>Input:</b> <code>msg.payload</code> muss Integer 0..3 sein:</p>
  <ul>
    <li>0 = Zwischenstellung (intermediate)</li>
    <li>1 = AUS (off)</li>
    <li>2 = EIN (on)</li>
    <li>3 = unbestimmt/ungültig (indeterminate)</li>
  </ul>

  <p>
    Die Objektadresse <code>ioa</code> wird als Array aus drei Bytes aufgebaut:
    <code>[ioa0, ioa1, ioa2]</code>.
  </p>

  <p>
    Die Quality-Merkmale <code>invalid</code>, <code>substituted</code>, <code>blocked</code> und
    <code>notTopical</code> können entweder aus <code>msg.quality</code> übernommen oder in der Node
    fest erzwungen werden.
  </p>

  <p>
    Bei <b>M_DP_TA_1</b> / <b>M_DP_TB_1</b> wird ein Zeitstempel in <code>ts</code> gesetzt.
    Optional kann <code>msg.ts</code> übernommen werden, wenn "msg.ts übernehmen" gewählt ist.
  </p>
</script>
