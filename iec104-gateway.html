<script type="text/javascript">
RED.nodes.registerType('iec104-gateway',{
  category: 'config',
  defaults: {
    name: {value: ''},
    port: {value: 2404, required: true, validate: RED.validators.number()},
    t1: { value: 15, required: true, validate: RED.validators.number()},
    t3: { value: 20, required: true, validate: RED.validators.number()},
    k_win: { value: 12, required: true, validate: RED.validators.number()},
    w_win: { value: 8, required: true, validate: RED.validators.number()}
  },
  label: function() {
    return this.name || "IEC 60870-5-104 Gateway";
  },

  oneditprepare: function () {
    const nodeId = this.id;
    let es = null;

    const colors = {
      IDLE: "#666",
      CONNECTED: "#d98c00",
      DATA_TRANSFER: "green",
      STOPPED: "#1d6fd1",
      UNKNOWN: "#999"
    };

    function renderStatus(data) {
      const state = data?.state || "UNKNOWN";
      const reason = data?.reason || "";
      const color = colors[state] || colors.UNKNOWN;

      $("#node-config-status")
        .text(state)
        .css("color", color);

      $("#node-config-reason")
        .text(reason);
    }

    $.getJSON("iec104/" + nodeId + "/status")
      .done(renderStatus)
      .fail(function () {
        renderStatus({ state: "UNKNOWN", reason: "keine Verbindung" });
      });

    es = new EventSource("iec104/" + nodeId + "/events");
    es.addEventListener("status", function (evt) {
      try {
        renderStatus(JSON.parse(evt.data));
      } catch (err) {
        console.warn("IEC104 status parse error", err);
      }
    });

    es.onerror = function () {
      $("#node-config-status")
        .text("DISCONNECTED")
        .css("color", "red");
    };

    this._iec104EventSource = es;
  },

  oneditcancel: function () {
    if (this._iec104EventSource) {
      this._iec104EventSource.close();
      this._iec104EventSource = null;
    }
  },

  oneditsave: function () {
    if (this._iec104EventSource) {
      this._iec104EventSource.close();
      this._iec104EventSource = null;
    }
  }
});
</script>
<script type="text/html" data-template-name="iec104-gateway">

  <div class="form-row">
    <label for="node-config-input-name">Name</label>
    <input type="text" id="node-config-input-name">
  </div>
  
  <div class="form-row">
    <label for="node-config-input-port">Port</label>
    <input type="number" id="node-config-input-port">
  </div>

  <div class="form-row">
    <label for="node-config-input-t1">
      T1
      <i class="fa fa-info-circle" 
        title="Timeout für Bestätigung (ACK)"
        style="margin-left:6px; color:#888; cursor:help;">
      </i>
    </label>

    <input type="number" id="node-config-input-t1" style="width:80px;">
    <span style="margin-left:6px;">Sekunden</span>
  </div>
   <div class="form-row">
    <label for="node-config-input-t2">
      T2
      <i class="fa fa-info-circle" 
        title="Timeout für Bestätigung (ACK)"
        style="margin-left:6px; color:#888; cursor:help;">
      </i>
    </label>

    <input type="number" id="node-config-input-t2" style="width:80px;">
    <span style="margin-left:6px;">Sekunden</span>
  </div>

  <div class="form-row">
    <label for="node-config-input-t3">
      T3
      <i class="fa fa-info-circle" 
        title="Idle Timeout. Wenn keine Daten übertragen werden, wird ein Testframe (TESTFR) gesendet"
        style="margin-left:6px; color:#888; cursor:help;">
      </i>
    </label>

    <input type="number" id="node-config-input-t3" style="width:80px;">
    <span style="margin-left:6px;">Sekunden</span>
  </div>
  <div class="form-row">
    
  </div>

  <div class="form-row"">
    <label>k/w</label>
    <input type="number" id="node-config-input-k_win" placeholder="k" style="width:80px; margin-right:5px;">
    <input type="number" id="node-config-input-w_win" placeholder="w" style="width:80px;">
  </div>


  <hr>

  <div class="form-row">
    <label>Status</label>
    <span id="node-config-status" style="font-weight:bold;">UNKNOWN</span>
  </div>

  <div class="form-row">
    <label>Reason</label>
    <span id="node-config-reason" style="color:#666;"></span>
  </div>

</script>
