<script type="text/javascript">
RED.nodes.registerType('iec104-gateway',{
  category: 'config',
  defaults: {
    name: {value: ''},
    port: {value: 2404, required: true, validate: RED.validators.number()},
    t1: { value: 15, validate: RED.validators.number()},
    t3: { value: 20, validate: RED.validators.number()}
  },
  label: function() {
    return this.name || "IEC 60870-5-104 Gateway";
  }
});
</script>

<script type="text/html" data-template-name="iec104-gateway">

  <div class="form-row">
    <label for="node-config-input-name">Name</label>
    <input type="text" id="node-config-input-name">
  </div>
  
  <div class="form-row">
    <label for="node-config-input-port">Port</label>
    <input type="number" id="node-config-input-port">
  </div>

  <div class="form-row">
    <label for="node-config-input-t1">t1 (s)</label>
    <input type="number" id="node-config-input-t1">
  </div>

  <div class="form-row">
    <label for="node-config-input-t3">t3 (s)</label>
    <input type="number" id="node-config-input-t3">
  </div>

</script>
