<script type="text/html" data-help-name="iec104-gateway">

  <p>
    <b>IEC 60870-5-104 Gateway</b><br>
    Stellt eine IEC-104 Server-Verbindung (RTU) bereit.
  </p>

  <h3>Funktion</h3>
  <p>
    Die Node empfängt IEC-104 Verbindungen über TCP (Standardport 2404)
    und sendet eingehende Punkte als I-Frames.
  </p>

  <h3>Eingang</h3>
  <p>
    Erwartet ein JSON-Objekt im <code>msg.payload</code>:
  </p>

  <pre>
  {
    "ioa": 12,
    "type": "M_SP_NA_1",
    "value": true,
    "quality": {
      "invalid": false,
      "substituted": false,
      "blocked": false,
      "notTopical": false
    },
    "timestamp": 1700000000000
  }
  </pre>

  <h3>Ausgänge</h3>
  <ul>
  <li><b>Output 1:</b> Gesendete IEC-Frames (Buffer)</li>
  <li><b>Output 2:</b> Statusmeldungen (Verbindung, StartDT, StopDT, Timer)</li>
  </ul>

  <h3>Parameter</h3>
  <ul>
  <li><b>Common Address:</b> Stationsadresse der RTU</li>
  <li><b>Port:</b> TCP-Port (Standard 2404)</li>
  <li><b>t1:</b> Timeout für nicht bestätigte I-Frames (Sekunden, 0 = deaktiviert)</li>
  <li><b>t3:</b> Inaktivitäts-Timeout für TESTFR (Sekunden, 0 = deaktiviert)</li>
  </ul>

  <h3>Hinweise</h3>
  <ul>
  <li>Unterstützt Global Interrogation (GI)</li>
  <li>Process Image wird intern verwaltet</li>
  <li>SPONT Meldungen werden sofort übertragen</li>
  </ul>

</script>
